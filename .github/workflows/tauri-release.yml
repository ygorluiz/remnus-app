name: Tauri Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install JS dependencies
        run: npm ci

      - name: Generate Tauri icons
        run: npx tauri icon public/logo-square-dark.png

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Remnus ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Upload version-less, stable-named copies so /download can link to
      # https://github.com/<repo>/releases/latest/download/<stable-name> without
      # ever needing the page updated per release. The release is published
      # (releaseDraft: false), so latest/download resolves as soon as CI finishes.
      - name: Upload stable-named installers
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          shopt -s nullglob
          upload() {
            local pattern="$1"; local stable="$2"
            local matches=( $pattern )
            if [ ${#matches[@]} -gt 0 ]; then
              local dest="${RUNNER_TEMP}/${stable}"
              cp "${matches[0]}" "$dest"
              echo "Uploading ${matches[0]} as ${stable}"
              gh release upload "$TAG" "$dest" --clobber --repo "$GITHUB_REPOSITORY"
            else
              echo "No match for ${pattern} (skipping)"
            fi
          }
          case "$RUNNER_OS" in
            Windows)
              upload "src-tauri/target/release/bundle/nsis/*-setup.exe" "Remnus-windows-x64-setup.exe"
              ;;
            macOS)
              upload "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg" "Remnus-macos-aarch64.dmg"
              upload "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg" "Remnus-macos-intel.dmg"
              ;;
            Linux)
              upload "src-tauri/target/release/bundle/appimage/*.AppImage" "Remnus-linux-x86_64.AppImage"
              upload "src-tauri/target/release/bundle/deb/*.deb" "Remnus-linux-amd64.deb"
              ;;
          esac
